apiVersion: batch/v1
kind: Job
metadata:
  name: ph288-cleanup-prod
  namespace: keybuzz-api-prod
  labels:
    app: db-cleanup
    phase: ph288
    environment: prod
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: db-cleanup
    spec:
      restartPolicy: Never
      containers:
        - name: cleanup
          image: postgres:17-alpine
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: keybuzz-api-postgres
                  key: PGHOST
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: keybuzz-api-postgres
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: keybuzz-api-postgres
                  key: PGPASSWORD
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: keybuzz-api-postgres
                  key: PGDATABASE
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "========================================"
              echo "PH28.8 - PROD Database Cleanup"
              echo "Date: $(date -Iseconds)"
              echo "========================================"
              
              # Tenant to KEEP (the only legitimate one)
              KEEP_TENANT_ID='ecomlg-ml4z5ys4'
              
              echo ""
              echo "=== COUNTS BEFORE CLEANUP ==="
              echo "Users: $(psql -t -c 'SELECT COUNT(*) FROM users;')"
              echo "Tenants: $(psql -t -c 'SELECT COUNT(*) FROM tenants;')"
              echo "User-Tenant relations: $(psql -t -c 'SELECT COUNT(*) FROM user_tenants;')"
              echo "Conversations: $(psql -t -c 'SELECT COUNT(*) FROM conversations;')"
              echo "Messages: $(psql -t -c 'SELECT COUNT(*) FROM messages;')"
              
              echo ""
              echo "=== KEEPING ==="
              echo "Tenant: $KEEP_TENANT_ID"
              
              echo ""
              echo "=== STEP 1: Clean up AI data for other tenants ==="
              psql -c "DELETE FROM ai_action_log WHERE tenant_id != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              psql -c "DELETE FROM ai_journal_events WHERE tenant_id != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              psql -c "DELETE FROM ai_returns_decision_trace WHERE tenant_id != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              psql -c "DELETE FROM ai_actions_ledger WHERE tenant_id != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              psql -c "DELETE FROM ai_actions_wallet WHERE tenant_id != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              psql -c "DELETE FROM ai_credits_ledger WHERE tenant_id != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              psql -c "DELETE FROM ai_credits_wallet WHERE tenant_id != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              psql -c "DELETE FROM ai_budget_alerts WHERE tenant_id != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              psql -c "DELETE FROM ai_budget_settings WHERE tenant_id != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              echo "AI data cleaned"
              
              echo ""
              echo "=== STEP 2: Clean up marketplace data for other tenants ==="
              psql -c "DELETE FROM marketplace_octopia_accounts WHERE \"tenantId\" != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              psql -c "DELETE FROM marketplace_connections WHERE \"tenantId\" != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              psql -c "DELETE FROM marketplace_sync_states WHERE \"tenantId\" != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              echo "Marketplace data cleaned"
              
              echo ""
              echo "=== STEP 3: Clean up inbound data for other tenants ==="
              psql -c "DELETE FROM inbound_addresses WHERE \"tenantId\" != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              psql -c "DELETE FROM inbound_connections WHERE \"tenantId\" != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              echo "Inbound data cleaned"
              
              echo ""
              echo "=== STEP 4: Clean up Amazon returns for other tenants ==="
              psql -c "DELETE FROM amazon_returns WHERE tenant_id != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              psql -c "DELETE FROM amazon_returns_sync_status WHERE tenant_id != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              echo "Amazon returns cleaned"
              
              echo ""
              echo "=== STEP 5: Clean up return analyses for other tenants ==="
              psql -c "DELETE FROM return_analyses WHERE tenant_id != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              echo "Return analyses cleaned"
              
              echo ""
              echo "=== STEP 6: Clean up space invites for other tenants ==="
              psql -c "DELETE FROM space_invites WHERE tenant_id != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              echo "Space invites cleaned"
              
              echo ""
              echo "=== STEP 7: Clean up tenant metadata for other tenants ==="
              psql -c "DELETE FROM tenant_metadata WHERE tenant_id != '$KEEP_TENANT_ID';" 2>/dev/null || echo "Table doesn't exist or empty"
              echo "Tenant metadata cleaned"
              
              echo ""
              echo "=== STEP 8: Delete user_tenants relations for other tenants ==="
              psql -c "DELETE FROM user_tenants WHERE tenant_id != '$KEEP_TENANT_ID';"
              echo "User-tenant relations cleaned"
              
              echo ""
              echo "=== STEP 9: Delete tenants (CASCADE will clean conversations/messages) ==="
              psql -c "DELETE FROM tenants WHERE id != '$KEEP_TENANT_ID';"
              echo "Tenants deleted"
              
              echo ""
              echo "=== STEP 10: Delete users not related to kept tenant ==="
              psql -c "DELETE FROM users WHERE id NOT IN (SELECT user_id FROM user_tenants WHERE tenant_id = '$KEEP_TENANT_ID');"
              echo "Orphan users deleted"
              
              echo ""
              echo "=== COUNTS AFTER CLEANUP ==="
              echo "Users: $(psql -t -c 'SELECT COUNT(*) FROM users;')"
              echo "Tenants: $(psql -t -c 'SELECT COUNT(*) FROM tenants;')"
              echo "User-Tenant relations: $(psql -t -c 'SELECT COUNT(*) FROM user_tenants;')"
              echo "Conversations: $(psql -t -c 'SELECT COUNT(*) FROM conversations;')"
              echo "Messages: $(psql -t -c 'SELECT COUNT(*) FROM messages;')"
              
              echo ""
              echo "=== REMAINING DATA ==="
              echo "Users:"
              psql -c "SELECT id, email, name FROM users;"
              echo ""
              echo "Tenants:"
              psql -c "SELECT id, name, plan, status FROM tenants;"
              echo ""
              echo "User-Tenant relations:"
              psql -c "SELECT * FROM user_tenants;"
              
              echo ""
              echo "========================================"
              echo "PH28.8 PROD Cleanup Complete"
              echo "========================================"
