apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: keybuzz-admin-v2
  name: keybuzz-admin-v2
  namespace: keybuzz-admin-v2-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-admin-v2
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: keybuzz-admin-v2
    spec:
      containers:
      - name: keybuzz-admin-v2
        # PH-T8.11AJ: owner-aware playbook PROD — marketing_owner_tenant_id in campaign URLs (KEY-222)
        image: ghcr.io/keybuzzio/keybuzz-admin:v2.11.31-owner-aware-playbook-prod  # rollback: v2.11.23-marketing-menu-truth-cleanup-prod
        imagePullPolicy: Always
        env:
        - name: NODE_ENV
          value: production
        - name: NEXT_PUBLIC_API_URL
          value: https://api.keybuzz.io
        - name: NEXT_PUBLIC_APP_ENV
          value: production
        - name: NEXTAUTH_URL
          value: https://admin.keybuzz.io
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              key: NEXTAUTH_SECRET
              name: keybuzz-admin-v2-auth
              optional: true
        - name: KEYBUZZ_API_INTERNAL_URL
          value: http://keybuzz-api.keybuzz-api-prod.svc.cluster.local
        - name: ADMIN_BOOTSTRAP_EMAIL
          valueFrom:
            secretKeyRef:
              key: ADMIN_BOOTSTRAP_EMAIL
              name: keybuzz-admin-v2-bootstrap
        - name: ADMIN_BOOTSTRAP_PASSWORD_HASH
          valueFrom:
            secretKeyRef:
              key: ADMIN_BOOTSTRAP_PASSWORD_HASH
              name: keybuzz-admin-v2-bootstrap
        - name: PGHOST
          valueFrom:
            secretKeyRef:
              key: PGHOST
              name: keybuzz-admin-v2-postgres
        - name: PGPORT
          valueFrom:
            secretKeyRef:
              key: PGPORT
              name: keybuzz-admin-v2-postgres
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              key: PGDATABASE
              name: keybuzz-admin-v2-postgres
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              key: PGUSER
              name: keybuzz-admin-v2-postgres
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              key: PGPASSWORD
              name: keybuzz-admin-v2-postgres
        ports:
        - containerPort: 3000
          name: http
        livenessProbe:
          httpGet:
            path: /login
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /login
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 384Mi
      imagePullSecrets:
      - name: ghcr-secret
