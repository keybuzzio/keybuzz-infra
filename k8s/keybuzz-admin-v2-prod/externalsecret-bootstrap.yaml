apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keybuzz-admin-v2-bootstrap
  namespace: keybuzz-admin-v2-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: keybuzz-admin-v2-bootstrap
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ADMIN_BOOTSTRAP_EMAIL
      remoteRef:
        key: keybuzz/admin-v2/bootstrap
        property: email
    - secretKey: ADMIN_BOOTSTRAP_PASSWORD_HASH
      remoteRef:
        key: keybuzz/admin-v2/bootstrap
        property: password_hash
