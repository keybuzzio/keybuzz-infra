apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-client
  namespace: keybuzz-client-prod
  labels:
    app: keybuzz-client
    environment: production
  annotations:
    argocd.argoproj.io/tracking-id: "keybuzz-client-prod:apps/Deployment:keybuzz-client-prod/keybuzz-client"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-client
  template:
    metadata:
      labels:
        app: keybuzz-client
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      imagePullSecrets:
        - name: ghcr-cred
      containers:
        - name: keybuzz-client
          # RESTORE PROD to last known good client (2026-03-20)
          # PREVIOUS: v3.5.59-channels-stripe-sync-prod (focus mode ON regression)
          # RESTORED: v3.5.58-channels-billing-prod (focus mode OFF, paywall OK)
          # ROLLBACK: v3.5.59-channels-stripe-sync-prod
          image: ghcr.io/keybuzzio/keybuzz-client:v3.5.75-amz-orders-list-sync-fix-prod
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: NEXTAUTH_URL
              value: "https://client.keybuzz.io"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: NEXTAUTH_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: AZURE_AD_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: AZURE_AD_CLIENT_ID
            - name: AZURE_AD_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: AZURE_AD_CLIENT_SECRET
            - name: AZURE_AD_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: AZURE_AD_TENANT_ID
            - name: NEXT_PUBLIC_APP_ENV
              value: "production"
            - name: BACKEND_URL
              value: "http://keybuzz-api.keybuzz-api-prod.svc.cluster.local:80"
            - name: API_URL
              value: "https://api.keybuzz.io"
            - name: AMAZON_BACKEND_URL
              value: "http://keybuzz-backend.keybuzz-backend-prod.svc.cluster.local:4000"
            - name: API_URL_INTERNAL
              value: "http://keybuzz-api.keybuzz-api-prod.svc.cluster.local:80"
            - name: KEYBUZZ_INTERNAL_PROXY_TOKEN
              value: "a0b9714c287bd18577f2e430770169e4b969bcfbbcedccdcf420cd09acd09147"
