apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-client
  namespace: keybuzz-client-prod
  labels:
    app: keybuzz-client
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-client
  template:
    metadata:
      labels:
        app: keybuzz-client
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      imagePullSecrets:
        - name: ghcr-cred
      containers:
        - name: keybuzz-client
          # ROLLBACK: v3.5.79-fix-reply-tenantid-prod
          # PH59: OAuth Google/Microsoft connexion + inscription
          image: ghcr.io/keybuzzio/keybuzz-client:v3.5.80-ph63b-amazon-customer-handle-prod
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # NextAuth runtime config
            - name: NEXTAUTH_URL
              value: "https://client.keybuzz.io"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: NEXTAUTH_SECRET
            # Google OAuth
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: GOOGLE_CLIENT_SECRET
            # Azure AD OAuth
            - name: AZURE_AD_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: AZURE_AD_CLIENT_ID
            - name: AZURE_AD_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: AZURE_AD_CLIENT_SECRET
            - name: AZURE_AD_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: AZURE_AD_TENANT_ID
            # Environment marker
            - name: NEXT_PUBLIC_APP_ENV
              value: "production"
            # PH30.5: Backend API URLs (server-side BFF only)
            - name: BACKEND_URL
              value: "http://keybuzz-api.keybuzz-api-prod.svc.cluster.local:80"
            - name: API_URL
              value: "https://api.keybuzz.io"
            - name: AMAZON_BACKEND_URL
              value: "http://keybuzz-backend.keybuzz-backend-prod.svc.cluster.local:4000"
            - name: API_URL_INTERNAL
              value: "http://keybuzz-api.keybuzz-api-prod.svc.cluster.local:80"
            - name: KEYBUZZ_INTERNAL_PROXY_TOKEN
              value: "a0b9714c287bd18577f2e430770169e4b969bcfbbcedccdcf420cd09acd09147"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"




