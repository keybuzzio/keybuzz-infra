apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-client
  namespace: keybuzz-client-prod
  labels:
    app: keybuzz-client
    environment: production
  annotations:
    argocd.argoproj.io/tracking-id: "keybuzz-client-prod:apps/Deployment:keybuzz-client-prod/keybuzz-client"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-client
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  minReadySeconds: 5
  template:
    metadata:
      labels:
        app: keybuzz-client
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      imagePullSecrets:
        - name: ghcr-cred
      containers:
        - name: keybuzz-client
          # PH-HARD-REFRESH-FIRST-HIT-STABILITY-01: readiness probe + zero-downtime strategy
          # PREVIOUS: v3.5.106-ph131-starter-upsell-prod
          # PREVIOUS: v3.5.107-ph131-autopilot-engine-prod
          # PREVIOUS: v3.5.124-playbooks-backend-migration-prod
          # PREVIOUS: v3.5.126-playbooks-suggestions-live-prod
          # PH133-A: Autopilot contextual draft generation (2026-03-29)
          # ROLLBACK: v3.5.224-ph143-agents-ia-prod
          # PREVIOUS: v3.5.258-ph146.4-billing-addons-prod  # PH146.4 billing addons
          # PH-T8.9D: funnel instrumentation PROD — pre-tenant CRO visibility (2026-04-27)
          # PH-T8.10J: marketing owner stack PROD promotion (2026-04-24)
          # PH-T8.10X: LinkedIn launch readiness PROD — Insight Tag + li_fat_id (KEY-188)
          # PH-T8.11P: LinkedIn tracking hardened — default ARG in Dockerfile (KEY-203)
          # WARNING: rebuild MUST include --build-arg NEXT_PUBLIC_LINKEDIN_PARTNER_ID=9969977
          # (Dockerfile now defaults to 9969977 but explicit --build-arg is recommended)
          # PH-GA4-CLIENT-ACTIVATION: GA4 activated via --build-arg NEXT_PUBLIC_GA4_MEASUREMENT_ID=G-R3QQDYEBFG
          # PREVIOUS: v3.5.122-ga4-activation-prod
          # PH-SAAS-T8.12N.4: Sample Demo Wow UI PROD — non-polluting guided experience
          # PH-T8.12P: TikTok browser pixel activated (D7PT12JC77U44OJIPC10)
          # CompletePayment = server-side only (dedup event_id mismatch)
          # Browser events: PageView, SubmitForm, InitiateCheckout
          # WARNING: rebuild MUST include --build-arg NEXT_PUBLIC_TIKTOK_PIXEL_ID=D7PT12JC77U44OJIPC10
          # PH-T8.12R: GA4 + sGTM restored on Client funnel
          # --build-arg NEXT_PUBLIC_GA4_MEASUREMENT_ID=G-R3QQDYEBFG
          # --build-arg NEXT_PUBLIC_SGTM_URL=https://t.keybuzz.pro
          # PH-T8.12S: Meta Pixel Client SAFE — Purchase browser removed (CAPI server-side only)
          # --build-arg NEXT_PUBLIC_META_PIXEL_ID=1234164602194748
          # Browser Meta events: PageView, Lead, CompleteRegistration, InitiateCheckout
          # Purchase = server-side only via Meta CAPI (dedup: no matching event_id browser/server)
          # PH-SAAS-T8.12R.1: Sample Demo platform-aware PROD promotion (KEY-235)
          # PH-T8.12U: Combined SaaS Demo + Tracking parity — single unified image
          # SaaS: platform-aware demo (3 Amazon, 1 Octopia, 1 email, no refund-first)
          # Tracking: GA4 G-R3QQDYEBFG + sGTM t.keybuzz.pro + TikTok D7PT12JC77U44OJIPC10
          #   + LinkedIn 9969977 + Meta 1234164602194748
          # Purchase browser ABSENT (Meta CAPI server-side only)
          # CompletePayment browser ABSENT (TikTok Events API server-side only)
          # PH-CLIENT-T8.12AJ.1: Shopify official logo PNG (visual only, no connector activation)
          # PH-SAAS-T8.12AO.10.2: Amazon inbound guide polish + demo gating PROD
          # - Seller Central mini-tutorial thumbnails with lightbox
          # - Compact channel callout no longer duplicates email
          # - /start guide preserved with thumbnails
          # - Sample Demo hidden after real channel connection
          # PH-SAAS-T8.12AP.1B: AI no-reask fix — orderRef always injected + anti-reask instruction (KEY-256)
          # PH-SAAS-T8.12AP.2.3: outbound author_name — X-User-Email in sendReply PROD (KEY-266)
          image: ghcr.io/keybuzzio/keybuzz-client:v3.5.201-register-polish-prod  # PH-SAAS-T8.12AS.20.6C-REGISTER-CTA-TRIAL-COPY-APPLY-PROD (2026-05-22): commit client be45f1d ; KEY-345 : promotion PROD register polish PH-20.6A + PH-20.6C apres validation DEV ; PH-20.6C : nouveau CTA Demarrer mon essai gratuit - 0 EUR aujourd hui + microcopy IIFE dynamique (Puis {plan.name} a {displayPrice} EUR/mois dans 14 jours, seulement si vous continuez) ; PH-20.6A promote PROD : TrialValueBanner premium + ReassurancePanel benefits + grand encart 0 EUR pendant 14 jours + absence CB pre-plan ; PH-20.6B abandonne (cards revert PH-20.6A pricing PH33.11 strikethrough) ; Logique pricing 100% INCHANGE (PRICING_CONFIG, getAnnualPrice, isAnnual, plan_selected, handleConfirmPlanAndCheckout) ; Pas de mention Payez 0 (interdit brief) ; KEY-263 isolation PROD STRICT : api-prod=87, api-dev=0 ; KEY-302 Clarity preservee : wuk12h9i33=2, route-gated SaaSAnalytics.tsx INCHANGE ; PH-19.x preserves : data-clarity-mask=2 chunks, drafts CGU, plan_selected, attribution ; 0 fake event delta vs baseline v3.5.200 ; rollback: v3.5.200-clarity-register-prod ; manifest digest GHCR: sha256:cdac2eccba00f83a967441d043e567620c1b9349c7a30314cbea17ccbdbd4cc5
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: NEXTAUTH_URL
              value: "https://client.keybuzz.io"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: NEXTAUTH_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: AZURE_AD_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: AZURE_AD_CLIENT_ID
            - name: AZURE_AD_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: AZURE_AD_CLIENT_SECRET
            - name: AZURE_AD_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth-secrets
                  key: AZURE_AD_TENANT_ID
            - name: NEXT_PUBLIC_APP_ENV
              value: "production"
            - name: BACKEND_URL
              value: "http://keybuzz-api.keybuzz-api-prod.svc.cluster.local:80"
            - name: API_URL
              value: "https://api.keybuzz.io"
            - name: AMAZON_BACKEND_URL
              value: "http://keybuzz-backend.keybuzz-backend-prod.svc.cluster.local:4000"
            - name: API_URL_INTERNAL
              value: "http://keybuzz-api.keybuzz-api-prod.svc.cluster.local:80"
            - name: KEYBUZZ_INTERNAL_PROXY_TOKEN
              value: "a0b9714c287bd18577f2e430770169e4b969bcfbbcedccdcf420cd09acd09147"
