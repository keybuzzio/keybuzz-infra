# TEMPLATE — Ne JAMAIS commit l'URL reelle dans Git !
#
# Creer le secret manuellement :
#   kubectl create secret generic monitoring-webhook \
#     --namespace=vault-management \
#     --from-literal=url=https://discord.com/api/webhooks/XXXXXX/YYYYYY
#
# Ou pour Slack :
#   kubectl create secret generic monitoring-webhook \
#     --namespace=vault-management \
#     --from-literal=url=https://hooks.slack.com/services/XXX/YYY/ZZZ
#
# Le webhook est optionnel — les emails fonctionnent sans.
#
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-webhook
  namespace: vault-management
  labels:
    app.kubernetes.io/component: monitoring-alerts
type: Opaque
data:
  url: "REPLACEME_BASE64_ENCODED_WEBHOOK_URL"
