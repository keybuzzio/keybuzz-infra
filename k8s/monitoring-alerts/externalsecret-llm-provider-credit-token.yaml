# PH-SAAS-T8.12AS.21.34: dedicated token for monitoring-alerts LLM provider credit watcher.
# Source path is shared with API DEV so both namespaces receive the same logical token.
# PH-21.35 must materialize the value in Vault before runtime activation.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: monitoring-llm-provider-credit-token
  namespace: vault-management
  labels:
    app.kubernetes.io/component: monitoring-alerts
    app.kubernetes.io/part-of: llm-provider-credit-monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: monitoring-llm-provider-credit-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: secret/keybuzz/llm_provider_credit/dev/monitor_token
        property: value
