apiVersion: v1
kind: ServiceAccount
metadata:
  name: keybuzz-monitor
  namespace: vault-management
  labels:
    app.kubernetes.io/component: monitoring-alerts
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: keybuzz-monitor
  labels:
    app.kubernetes.io/component: monitoring-alerts
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "patch", "create"]
    resourceNames:
      - monitoring-alert-state
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: keybuzz-monitor
  labels:
    app.kubernetes.io/component: monitoring-alerts
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: keybuzz-monitor
subjects:
  - kind: ServiceAccount
    name: keybuzz-monitor
    namespace: vault-management
