# PH-SAAS-T8.12AS.21.49: dedicated PROD token for monitoring-alerts LLM provider credit watcher.
# Source path is shared with API PROD so both namespaces receive the same logical token.
# OPS must materialize the value in Vault before GitOps PROD apply.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: monitoring-llm-provider-credit-token-prod
  namespace: vault-management
  labels:
    app.kubernetes.io/component: monitoring-alerts
    app.kubernetes.io/part-of: llm-provider-credit-monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: monitoring-llm-provider-credit-token-prod
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: secret/keybuzz/llm_provider_credit/prod/monitor_token
        property: value
