apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-client
  namespace: keybuzz-client-dev
  labels:
    app: keybuzz-client
    environment: development
  annotations:
    argocd.argoproj.io/tracking-id: "keybuzz-client-dev:apps/Deployment:keybuzz-client-dev/keybuzz-client"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-client
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  minReadySeconds: 5
  template:
    metadata:
      labels:
        app: keybuzz-client
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      imagePullSecrets:
        - name: ghcr-cred
      containers:
        - name: keybuzz-client
          # PH140-D: Agent invite/activate/login unification
          # PREVIOUS: v3.5.167-agent-auth-scope-dev
          # PREVIOUS: v3.5.170-agent-invite-e2e-trace-recovery-dev  # PH140-F
          # PREVIOUS: v3.5.171-real-browser-invite-loop-fix-dev  # PH140-G
          # PREVIOUS: v3.5.173-invite-login-ux-polish-dev  # PH140-I
          # PREVIOUS: v3.5.174-agent-hard-access-lockdown-dev  # PH140-J
          # PREVIOUS: v3.5.175-assignment-semantics-dev  # PH140-K
          # PREVIOUS: v3.5.176-agent-supervision-dev  # PH140-L
          # PREVIOUS: v3.5.177-sla-priority-dev  # PH140-M
          # PREVIOUS: v3.5.178-agent-limits-dev  # PH141-A
          # PREVIOUS: v3.5.181-critical-polish-dev  # PH141-E
          # PREVIOUS: v3.5.183-ai-quality-loop-dev  # PH142-A
          # PREVIOUS: v3.5.184-ai-error-clustering-dev  # PH142-B
          # ROLLBACK: v3.5.224-ph143-agents-otp-session-fix-dev
          # PREVIOUS: v3.5.258-ph146.4-billing-addons-dev  # PH146.4 billing addons
          # PH-T8.9B: funnel instrumentation — pre-tenant CRO visibility (2026-04-27)
          # PH-T8.10B: marketing owner mapping foundation (2026-05-01)
          # PH-T8.10W: LinkedIn launch readiness — li_fat_id capture + Insight Tag active (KEY-188)
          # PH-T8.11P: LinkedIn tracking hardened — default ARG in Dockerfile (KEY-203)
