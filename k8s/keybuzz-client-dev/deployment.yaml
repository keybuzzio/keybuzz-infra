          # PH-SAAS-T8.12L: OnboardingWizard activation — guided trial onboarding
          # PREVIOUS: v3.5.131-trial-effectiveplan-client-dev  # PH-SAAS-T8.12K
          # PH-SAAS-T8.12L.2: Onboarding read model + useOnboardingStatus
          # PREVIOUS: v3.5.132-onboarding-wizard-dev
          # PH-SAAS-T8.12L.3: Metronic data-aware onboarding UI (trial/plan context fix)
          # PREVIOUS: v3.5.133-onboarding-readmodel-dev
          # PH-SAAS-T8.12L.3.1: G1 profile mapping fix + G2 mobile 390px responsive
          # PREVIOUS: v3.5.135-onboarding-metronic-fix-dev
          # PREVIOUS: v3.5.136-onboarding-metronic-closure-dev
