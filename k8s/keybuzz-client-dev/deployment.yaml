          # (Dockerfile now defaults to 9969977 but explicit --build-arg is recommended)
          # PH-GA4-CLIENT-ACTIVATION: GA4 activated via --build-arg NEXT_PUBLIC_GA4_MEASUREMENT_ID=G-R3QQDYEBFG
          # PREVIOUS: v3.5.122-ga4-activation-dev
