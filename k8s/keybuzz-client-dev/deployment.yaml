apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-client
  namespace: keybuzz-client-dev
  labels:
    app: keybuzz-client
    environment: development
  annotations:
    argocd.argoproj.io/tracking-id: "keybuzz-client-dev:apps/Deployment:keybuzz-client-dev/keybuzz-client"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-client
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  minReadySeconds: 5
  template:
    metadata:
      labels:
        app: keybuzz-client
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      imagePullSecrets:
        - name: ghcr-cred
      containers:
        - name: keybuzz-client
          # PH140-D: Agent invite/activate/login unification
          # PREVIOUS: v3.5.167-agent-auth-scope-dev
          # PREVIOUS: v3.5.170-agent-invite-e2e-trace-recovery-dev  # PH140-F
          # PREVIOUS: v3.5.171-real-browser-invite-loop-fix-dev  # PH140-G
          # PREVIOUS: v3.5.173-invite-login-ux-polish-dev  # PH140-I
          # PREVIOUS: v3.5.174-agent-hard-access-lockdown-dev  # PH140-J
          # PREVIOUS: v3.5.175-assignment-semantics-dev  # PH140-K
          # PREVIOUS: v3.5.176-agent-supervision-dev  # PH140-L
          # PREVIOUS: v3.5.177-sla-priority-dev  # PH140-M
          # PREVIOUS: v3.5.178-agent-limits-dev  # PH141-A
          # PREVIOUS: v3.5.181-critical-polish-dev  # PH141-E
          # PREVIOUS: v3.5.183-ai-quality-loop-dev  # PH142-A
          # PREVIOUS: v3.5.184-ai-error-clustering-dev  # PH142-B
          image: ghcr.io/keybuzzio/keybuzz-client:v3.5.218-ph143-fr-real-fix-dev  # PH143-FR.3
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: NEXTAUTH_URL
              value: "https://client-dev.keybuzz.io"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth
                  key: NEXTAUTH_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth
                  key: GOOGLE_CLIENT_SECRET
            - name: AZURE_AD_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth
                  key: AZURE_AD_CLIENT_ID
            - name: AZURE_AD_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth
                  key: AZURE_AD_CLIENT_SECRET
            - name: AZURE_AD_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: keybuzz-auth
                  key: AZURE_AD_TENANT_ID
            - name: BACKEND_URL
              value: "http://keybuzz-api.keybuzz-api-dev.svc.cluster.local:3001"
            - name: API_URL
              value: "https://api-dev.keybuzz.io"
            - name: AMAZON_BACKEND_URL
              value: "http://keybuzz-backend.keybuzz-backend-dev.svc.cluster.local:4000"
            - name: API_URL_INTERNAL
              value: "http://keybuzz-api.keybuzz-api-dev.svc.cluster.local:3001"
            - name: KEYBUZZ_INTERNAL_PROXY_TOKEN
              value: "a0b9714c287bd18577f2e430770169e4b969bcfbbcedccdcf420cd09acd09147"
