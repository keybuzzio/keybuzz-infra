apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-admin-v2
  namespace: keybuzz-admin-v2-dev
  labels:
    app: keybuzz-admin-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-admin-v2
  template:
    metadata:
      labels:
        app: keybuzz-admin-v2
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: keybuzz-admin-v2
          image: ghcr.io/keybuzzio/keybuzz-admin-v2:v0.15.0-ph86.9a-billing-usage
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api-dev.keybuzz.io"
            - name: NEXT_PUBLIC_APP_ENV
              value: "development"
            - name: NEXTAUTH_URL
              value: "https://admin-dev.keybuzz.io"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-admin-v2-auth
                  key: NEXTAUTH_SECRET
                  optional: true
            - name: KEYBUZZ_API_INTERNAL_URL
              value: "http://keybuzz-api.keybuzz-api-dev.svc.cluster.local:3001"
            - name: ADMIN_BOOTSTRAP_EMAIL
              valueFrom:
                secretKeyRef:
                  name: keybuzz-admin-v2-bootstrap
                  key: ADMIN_BOOTSTRAP_EMAIL
            - name: ADMIN_BOOTSTRAP_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: keybuzz-admin-v2-bootstrap
                  key: ADMIN_BOOTSTRAP_PASSWORD_HASH
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: keybuzz-admin-v2-postgres
                  key: PGHOST
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: keybuzz-admin-v2-postgres
                  key: PGPORT
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: keybuzz-admin-v2-postgres
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: keybuzz-admin-v2-postgres
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: keybuzz-admin-v2-postgres
                  key: PGPASSWORD
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
