# Secret Stripe TEST pour Admin V2 DEV
# Créé manuellement avec :
#   kubectl create secret generic keybuzz-admin-v2-stripe \
#     --namespace=keybuzz-admin-v2-dev \
#     --from-literal=STRIPE_SECRET_KEY=sk_test_XXXX
#
# Note: Vault est DOWN — ce secret est créé manuellement et sera migré vers
# ExternalSecrets quand Vault sera restauré.
apiVersion: v1
kind: Secret
metadata:
  name: keybuzz-admin-v2-stripe
  namespace: keybuzz-admin-v2-dev
  labels:
    app: keybuzz-admin-v2
    component: stripe
type: Opaque
# Data populated via kubectl create secret (not committed)
