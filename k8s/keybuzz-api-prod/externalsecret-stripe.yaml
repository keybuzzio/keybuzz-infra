apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keybuzz-stripe
  namespace: keybuzz-api-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keybuzz-stripe
    creationPolicy: Owner
  data:
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: secret/keybuzz/prod/stripe
        property: STRIPE_SECRET_KEY
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: secret/keybuzz/prod/stripe
        property: STRIPE_WEBHOOK_SECRET
    - secretKey: STRIPE_PRICE_STARTER_MONTHLY
      remoteRef:
        key: secret/keybuzz/prod/stripe
        property: STRIPE_PRICE_STARTER_MONTHLY
    - secretKey: STRIPE_PRICE_STARTER_ANNUAL
      remoteRef:
        key: secret/keybuzz/prod/stripe
        property: STRIPE_PRICE_STARTER_ANNUAL
    - secretKey: STRIPE_PRICE_PRO_MONTHLY
      remoteRef:
        key: secret/keybuzz/prod/stripe
        property: STRIPE_PRICE_PRO_MONTHLY
    - secretKey: STRIPE_PRICE_PRO_ANNUAL
      remoteRef:
        key: secret/keybuzz/prod/stripe
        property: STRIPE_PRICE_PRO_ANNUAL
    - secretKey: STRIPE_PRICE_AUTOPILOT_MONTHLY
      remoteRef:
        key: secret/keybuzz/prod/stripe
        property: STRIPE_PRICE_AUTOPILOT_MONTHLY
    - secretKey: STRIPE_PRICE_AUTOPILOT_ANNUAL
      remoteRef:
        key: secret/keybuzz/prod/stripe
        property: STRIPE_PRICE_AUTOPILOT_ANNUAL
    - secretKey: STRIPE_PRICE_ADDON_CHANNEL_MONTHLY
      remoteRef:
        key: secret/keybuzz/prod/stripe
        property: STRIPE_PRICE_ADDON_CHANNEL_MONTHLY
    - secretKey: STRIPE_PRICE_ADDON_CHANNEL_ANNUAL
      remoteRef:
        key: secret/keybuzz/prod/stripe
        property: STRIPE_PRICE_ADDON_CHANNEL_ANNUAL
