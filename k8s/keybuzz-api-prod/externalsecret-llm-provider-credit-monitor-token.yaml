# PH-SAAS-T8.12AS.21.49: dedicated token for LLM provider credit watcher in API PROD.
# Source path follows the existing internal token convention:
# secret/keybuzz/<domain>/<env>/<purpose>, property value.
# OPS must materialize the value in Vault before GitOps PROD apply.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: monitoring-llm-provider-credit-token-prod
  namespace: keybuzz-api-prod
  labels:
    app: keybuzz-api
    app.kubernetes.io/component: llm-provider-credit-monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: monitoring-llm-provider-credit-token-prod
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: secret/keybuzz/llm_provider_credit/prod/monitor_token
        property: value
