apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: keybuzz-api-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: REDIS_URL
      remoteRef:
        key: keybuzz/redis
        property: REDIS_URL
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: keybuzz/redis
        property: REDIS_PASSWORD
