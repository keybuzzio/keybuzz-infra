apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-api
  namespace: keybuzz-api-prod
  labels:
    app: keybuzz-api
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-api
  template:
    metadata:
      labels:
        app: keybuzz-api
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      imagePullSecrets:
        - name: ghcr-cred
      containers:
        - name: keybuzz-api
          # ROLLBACK: v3.6.06-ph104-cross-tenant-intelligence-prod
          # ROLLBACK: v3.6.07-ph105-autonomous-ops-prod
          # ROLLBACK: v3.6.08-ph106-action-dispatcher-prod
          # ROLLBACK: v3.6.09-ph107-connector-abstraction-prod
          # ROLLBACK: v3.6.10-ph108-case-manager-prod
          # ROLLBACK: v3.6.11-ph109-case-state-persistence-prod
          # ROLLBACK: v3.6.12-ph110-controlled-execution-prod
          # ROLLBACK: v3.6.13-ph111-controlled-activation-prod
          # ROLLBACK: v3.6.15-ph113-real-connector-prod
          # ROLLBACK: v3.6.16-ph114-real-scaling-prod
          # ROLLBACK: v3.6.17-ph115-real-execution-prod
          # ROLLBACK PROD to PH115 stable isolation baseline (2026-03-20)
          # PREVIOUS: v3.6.20-ph116-integration-fix-prod
          # PREVIOUS: v3.5.104-ph131-autopilot-settings-prod
          # PREVIOUS: v3.5.107b-ph131-autopilot-engine-prod
          # PREVIOUS: v3.5.51-playbooks-suggestions-live-prod
          # PH132-C: Plan guard + engine logging + DB cleanup (2026-03-28)
          # PH132-D: Octopia autopilot trigger + backend env var (2026-03-28)
          # PH132-E: Bootstrap fix — seed starters 8 active / 7 disabled (2026-03-29)
          # PH133-A: Autopilot contextual draft generation (2026-03-29)
          # PH133-B: Delivery tracking truth recovery (2026-03-29)
          # PH136-B: Multi-carrier tracking aggregator (2026-03-30)
          # PH136-D: 17TRACK v2.4 webhook + register + polling (2026-03-31)
          # PH137-A: Autopilot smart response — improved prompts + history (2026-03-31)
          # PH137-C: AI consistency engine — unified Autopilot/Assist logic (2026-03-31)
          # PH137-D: AI mode orchestration — plan gating + mode engine (2026-03-31)
          # PH138-A: Stripe addon billing — Agent KeyBuzz product + endpoints (2026-03-31)
          # PH138-C: Stripe checkout enforced — no free activation (2026-03-31)
          # PH138-K: Stripe Checkout obligatoire addon, findPlanItem fix, old sub cleanup (2026-04-01)
          # PREVIOUS: v3.5.157-real-stripe-upgrade-e2e-prod
          # PREVIOUS: v3.5.165-escalation-flow-prod  # PH140-A
          # PREVIOUS: v3.5.173-invite-login-ux-polish-prod  # PH140-I
          # PREVIOUS: v3.5.178-agent-limits-prod  # PH141-A
          # PREVIOUS: v3.5.179-agent-limits-alignment-prod  # PH141-B
          # PREVIOUS: v3.5.182-ai-context-fix-prod  # PH141-F
          # PREVIOUS: v3.5.183-ai-quality-loop-prod  # PH142-A
          # PREVIOUS: v3.5.184-ai-error-clustering-prod  # PH142-B
          # PREVIOUS: v3.5.185-ai-action-consistency-prod  # PH142-C
          image: ghcr.io/keybuzzio/keybuzz-api:v3.5.224-ph143-agents-ia-prod  # PH143-P2
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: production
            - name: TRACKING_17TRACK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tracking-17track
                  key: TRACKING_17TRACK_API_KEY
                  optional: true
            - name: VAULT_ADDR
              value: 'http://vault.default.svc.cluster.local:8200'
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  key: VAULT_TOKEN
                  name: vault-root-token
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_URL
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: keybuzz-api-postgres
                  key: PGHOST
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: keybuzz-api-postgres
                  key: PGPORT
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: keybuzz-api-postgres
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: keybuzz-api-postgres
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: keybuzz-api-postgres
                  key: PGPASSWORD
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: keybuzz-stripe
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-stripe
                  key: STRIPE_WEBHOOK_SECRET
            - name: STRIPE_PRICE_STARTER_MONTHLY
              valueFrom:
                secretKeyRef:
                  name: keybuzz-stripe
                  key: STRIPE_PRICE_STARTER_MONTHLY
            - name: STRIPE_PRICE_STARTER_ANNUAL
              valueFrom:
                secretKeyRef:
                  name: keybuzz-stripe
                  key: STRIPE_PRICE_STARTER_ANNUAL
            - name: STRIPE_PRICE_PRO_MONTHLY
              valueFrom:
                secretKeyRef:
                  name: keybuzz-stripe
                  key: STRIPE_PRICE_PRO_MONTHLY
            - name: STRIPE_PRICE_PRO_ANNUAL
              valueFrom:
                secretKeyRef:
                  name: keybuzz-stripe
                  key: STRIPE_PRICE_PRO_ANNUAL
            - name: STRIPE_PRICE_AUTOPILOT_MONTHLY
              valueFrom:
                secretKeyRef:
                  name: keybuzz-stripe
                  key: STRIPE_PRICE_AUTOPILOT_MONTHLY
            - name: STRIPE_PRICE_AUTOPILOT_ANNUAL
              valueFrom:
                secretKeyRef:
                  name: keybuzz-stripe
                  key: STRIPE_PRICE_AUTOPILOT_ANNUAL
            - name: STRIPE_PRICE_ADDON_CHANNEL_MONTHLY
              valueFrom:
                secretKeyRef:
                  name: keybuzz-stripe
                  key: STRIPE_PRICE_ADDON_CHANNEL_MONTHLY
            - name: STRIPE_PRICE_ADDON_CHANNEL_ANNUAL
              valueFrom:
                secretKeyRef:
                  name: keybuzz-stripe
                  key: STRIPE_PRICE_ADDON_CHANNEL_ANNUAL
            - name: STRIPE_PRODUCT_ADDON_CHANNEL
              value: "prod_TpJTEELacYjLGG"
            # PH138-M: Agent KeyBuzz addon — LIVE mode IDs (2026-04-01)
            - name: STRIPE_PRODUCT_ADDON_AGENT_KEYBUZZ
              value: "prod_UFtAMUaGMjxErY"
            - name: STRIPE_PRICE_ADDON_AGENT_KEYBUZZ_MONTHLY
              value: "price_1THNOUFC0QQLHISR1Tm7B8FW"
            - name: STRIPE_PRICE_ADDON_AGENT_KEYBUZZ_ANNUAL
              value: "price_1THNOVFC0QQLHISRmvYEis5A"
            - name: APP_BASE_URL
              value: "https://client.keybuzz.io"
            - name: API_BASE_URL
              value: "https://api.keybuzz.io"
            - name: SMTP_HOST
              value: "49.13.35.167"
            - name: SMTP_PORT
              value: "25"
            - name: SMTP_SECURE
              value: "false"
            - name: SMTP_TLS_REJECT_UNAUTHORIZED
              value: "false"
            - name: SMTP_FROM
              value: '"KeyBuzz" <noreply@keybuzz.io>'
            - name: MINIO_ENDPOINT
              value: "http://10.0.0.11:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret-key
            - name: MINIO_BUCKET_ATTACHMENTS
              value: "keybuzz-attachments"
            - name: LITELLM_BASE_URL
              value: "https://llm.keybuzz.io"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-api-jwt
                  key: JWT_SECRET
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: keybuzz-api-jwt
                  key: COOKIE_SECRET
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: keybuzz-litellm
                  key: LITELLM_MASTER_KEY
            - name: BACKEND_INTERNAL_URL
              value: "http://keybuzz-api.keybuzz-api-prod.svc.cluster.local:3001"
            - name: AMAZON_OUTBOUND_ATTACHMENTS_ENABLED
            - name: LEGACY_BACKEND_URL
              value: "http://keybuzz-backend.keybuzz-backend-dev.svc.cluster.local:4000"
            - name: KEYBUZZ_INTERNAL_PROXY_TOKEN
              value: "a0b9714c287bd18577f2e430770169e4b969bcfbbcedccdcf420cd09acd09147"
              value: "true"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10