# Q-1T-4-B-EXEC-CRONJOB-FLIP-ALL-PLATFORMS PROD
# Calls POST /admin/internal/ad-accounts/sync-all in LIVE mode, all platforms (Meta + Google).
# Schedule: 4x/day at 06:00, 10:00, 14:00, 18:00 UTC (08/12/16/20 Paris CEST, 07/11/15/19 CET).
# Source: Q-1T-4-B-EXEC-CODE 01b163e4, Q-1T-4-B-EXEC-DEPLOY-API-PROD ed3ed69.
# Token: keybuzz-internal-tokens / AD_SPEND_SYNC_INTERNAL_TOKEN (Q-1T-4-B-EXEC-SECRET-PROD 8d40f36).
# Body: {"dryRun":false,"platform":"all"} - charge tous comptes actifs (Meta + Google) cote SQL (platformFilter=null endpoint internal-routes.ts L58).
# Validated bout-en-bout par Q-1T-4-B-EXEC-VALIDATE-LIVE-DEV-PROD-META (rapport b230d00).
# Google OAuth handling: refresh token rote 2026-05-19 (Q-1T-4-B-EXEC-GOOGLE-REFRESH-TOKEN-ROTATE), hash8 a10b3c0e DEV+PROD, smoke Google DEV+PROD status:"ok" 2 rows 0.0628 GBP.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ad-spend-sync-daily
  namespace: keybuzz-api-prod
spec:
  # 4x/day at 06:00, 10:00, 14:00, 18:00 UTC (08/12/16/20 Paris CEST).
  schedule: "0 6,10,14,18 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  suspend: false
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sync
              image: curlimages/curl:8.7.1
              command: ["/bin/sh", "-c"]
              args:
                - |
                  echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] ad-spend-sync-daily PROD live all-platforms starting"
                  if [ -z "${INTERNAL_TOKEN}" ]; then
                    echo "ERROR: INTERNAL_TOKEN missing"
                    exit 1
                  fi
                  RESPONSE=$(curl -sf \
                    -X POST \
                    -H "Content-Type: application/json" \
                    -H "X-Internal-Token: ${INTERNAL_TOKEN}" \
                    -d '{"dryRun":false,"platform":"all"}' \
                    --connect-timeout 5 \
                    --max-time 120 \
                    "http://keybuzz-api.keybuzz-api-prod.svc.cluster.local:80/admin/internal/ad-accounts/sync-all")
                  EXIT=$?
                  if [ $EXIT -ne 0 ]; then
                    echo "ERROR: curl failed with exit code $EXIT"
                    exit 1
                  fi
                  echo "Response: ${RESPONSE}"
                  echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] ad-spend-sync-daily PROD live all-platforms complete"
              env:
                - name: INTERNAL_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: keybuzz-internal-tokens
                      key: AD_SPEND_SYNC_INTERNAL_TOKEN
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
