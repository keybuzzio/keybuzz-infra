apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-backend
  namespace: keybuzz-backend-dev
  labels:
    app: keybuzz-backend
    app.kubernetes.io/instance: keybuzz-backend-dev
    app.kubernetes.io/name: keybuzz-backend
    app.kubernetes.io/part-of: keybuzz
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-backend
      app.kubernetes.io/instance: keybuzz-backend-dev
      app.kubernetes.io/name: keybuzz-backend
      app.kubernetes.io/part-of: keybuzz
      environment: dev
  template:
    metadata:
      labels:
        app: keybuzz-backend
        app.kubernetes.io/instance: keybuzz-backend-dev
        app.kubernetes.io/name: keybuzz-backend
        app.kubernetes.io/part-of: keybuzz
        environment: dev
    spec:
      containers:
        - name: keybuzz-backend
          image: ghcr.io/keybuzzio/keybuzz-backend:v1.0.56-amazon-inbound-dedup-dev  # PH-SAAS-T8.12AS.20.29 (2026-05-27) KEY-323 atomic dedup (advisory lock pg_advisory_xact_lock, PH-20.26) ; manifest digest sha256:ed3d6c1a7f322166635ec87ece6c804c7a689a6611c8eebea3d326a8fe66f81b ; config sha256:e3b5d2b30542 ; rollback: v1.0.55-amazon-inbound-dedup-dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4000
          envFrom:
            - secretRef:
                name: keybuzz-backend-db
            - secretRef:
                name: keybuzz-backend-secrets
            - secretRef:
                name: vault-token
                optional: true
            - secretRef:
                name: amazon-spapi-creds
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: KEYBUZZ_SUPERADMIN_EMAIL
              value: admin@keybuzz.io
            - name: VAULT_ADDR
              value: "http://vault.default.svc.cluster.local:8200"
            - name: CLIENT_APP_URL
              value: "https://client-dev.keybuzz.io"
            - name: ADMIN_CALLBACK_URL
              value: https://client-dev.keybuzz.io/inbound-email/amazon/callback
            - name: KEYBUZZ_DEV_MODE
              value: "true"
            - name: DEV_AUTH
              value: "true"
            - name: KEYBUZZ_INTERNAL_PROXY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: keybuzz-internal-proxy
                  key: token
            - name: API_INTERNAL_URL
              value: "http://keybuzz-api.keybuzz-api-dev.svc.cluster.local:3001"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: NODE_EXTRA_CA_CERTS
              value: "/etc/ssl/vault/vault-ca.pem"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: ghcr-cred