# PH-SAAS-T8.12AS.20.14F-BIS: scoped jobs worker DEV (Amazon validation pipeline)
# Consumes ONLY OUTBOUND_EMAIL_SEND jobs (JOB_TYPES) via dist/workers/jobsWorker.js;
#   never claims AMAZON_POLL (handled by the dedicated amazon-orders/items workers).
# Image v1.0.49 = scope-aware build (PH-20.14C-BIS / PH-20.14D-BIS). Do NOT use v1.0.48 (generic).
# env/secrets mirror the keybuzz-backend API deployment (DB + backend secrets + vault + spapi).
# SMTP: DEV relay reused from keybuzz-api-dev/keybuzz-outbound-worker (PH-20.14F-SMTP),
#   mail-core-01 :25, unauthenticated (no SMTP_USER/SMTP_PASS).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobs-worker
  namespace: keybuzz-backend-dev
  labels:
    app: jobs-worker
    component: worker
    tier: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobs-worker
  template:
    metadata:
      labels:
        app: jobs-worker
        component: worker
    spec:
      imagePullSecrets:
        - name: ghcr-cred
      containers:
        - name: worker
          image: ghcr.io/keybuzzio/keybuzz-backend:v1.0.57-amazon-notification-classification-dev  # PH-SAAS-T8.12AS.20.41 (2026-05-27) KEY-323 notification classification DEV (PH-20.38 src c38583a) ; manifest digest sha256:ab583b9c57bb47bddb35be594ffb8938bf7bd57d6f79b6f8906c341083c5d806 ; config sha256:5d965707a087 ; rollback: v1.0.56-amazon-inbound-dedup-dev
          command:
            - node
            - dist/workers/jobsWorker.js
          envFrom:
            - secretRef:
                name: keybuzz-backend-db
            - secretRef:
                name: keybuzz-backend-secrets
            - secretRef:
                name: vault-token
                optional: true
            - secretRef:
                name: amazon-spapi-creds
          env:
            - name: NODE_ENV
              value: production
            - name: VAULT_ADDR
              value: "http://vault.default.svc.cluster.local:8200"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            # PH-SAAS-T8.12AS.20.14C-BIS: scope this worker to validation email jobs only.
            - name: JOB_TYPES
              value: "OUTBOUND_EMAIL_SEND"
            # PH-SAAS-T8.12AS.20.14F-SMTP: DEV SMTP relay (mail-core-01 :25, unauthenticated)
            - name: SMTP_HOST
              value: "49.13.35.167"
            - name: SMTP_PORT
              value: "25"
            - name: SMTP_SECURE
              value: "false"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "ps aux | grep jobsWorker | grep -v grep"
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
      restartPolicy: Always
