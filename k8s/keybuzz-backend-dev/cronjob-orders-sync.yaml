# k8s/keybuzz-backend-dev/cronjob-orders-sync.yaml
# PH145.3: Fixed auth — added X-Internal-Token for backend devAuthMiddleware
apiVersion: batch/v1
kind: CronJob
metadata:
  name: amazon-orders-sync
  namespace: keybuzz-backend-dev
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sync-runner
              image: curlimages/curl:8.12.1
              env:
                - name: INTERNAL_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: keybuzz-internal-proxy
                      key: token
              command:
                - /bin/sh
                - -c
                - |
                  echo "Starting Global Amazon Orders Sync..."
                  curl -sk -X POST \
                    -H "X-User-Email: cron@system.keybuzz.io" \
                    -H "X-Tenant-Id: system-global" \
                    -H "X-Internal-Token: $INTERNAL_TOKEN" \
                    https://backend-dev.keybuzz.io/api/v1/orders/sync/run/global
                  echo ""
                  echo "Global sync completed"
              resources:
                limits:
                  memory: "64Mi"
                  cpu: "100m"
                requests:
                  memory: "32Mi"
                  cpu: "50m"