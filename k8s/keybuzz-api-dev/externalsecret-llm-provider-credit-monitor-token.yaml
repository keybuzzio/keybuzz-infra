# PH-SAAS-T8.12AS.21.34: dedicated token for LLM provider credit watcher in API DEV.
# Source path follows the existing internal token convention:
# secret/keybuzz/<domain>/<env>/<purpose>, property value.
# PH-21.35 must materialize the value in Vault before runtime activation.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: monitoring-llm-provider-credit-token
  namespace: keybuzz-api-dev
  labels:
    app: keybuzz-api
    app.kubernetes.io/component: llm-provider-credit-monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: monitoring-llm-provider-credit-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: secret/keybuzz/llm_provider_credit/dev/monitor_token
        property: value
