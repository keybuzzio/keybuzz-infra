apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: keybuzz-api
  name: keybuzz-api
  namespace: keybuzz-api-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-api
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: 'true'
      labels:
        app: keybuzz-api
    spec:
      containers:
      - env:
        - name: AMAZON_OUTBOUND_ATTACHMENTS_ENABLED
          value: "true"
        - name: PORT
          value: '3001'
        - name: NODE_ENV
          value: development
        - name: VAULT_ADDR
          value: 'http://vault.default.svc.cluster.local:8200'
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              key: VAULT_TOKEN
              name: vault-root-token
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: REDIS_URL
        - name: PGHOST
          valueFrom:
            secretKeyRef:
              key: PGHOST
              name: keybuzz-api-postgres
        - name: PGPORT
          valueFrom:
            secretKeyRef:
              key: PGPORT
              name: keybuzz-api-postgres
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              key: PGDATABASE
              name: keybuzz-api-postgres
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              key: PGUSER
              name: keybuzz-api-postgres
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              key: PGPASSWORD
              name: keybuzz-api-postgres
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: STRIPE_SECRET_KEY
              name: keybuzz-stripe
              optional: true
        - name: STRIPE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              key: STRIPE_WEBHOOK_SECRET
              name: keybuzz-stripe
              optional: true
        - name: STRIPE_PRICE_STARTER_MONTHLY
          valueFrom:
            secretKeyRef:
              key: STRIPE_PRICE_STARTER_MONTHLY
              name: keybuzz-stripe
              optional: true
        - name: STRIPE_PRICE_STARTER_ANNUAL
          valueFrom:
            secretKeyRef:
              key: STRIPE_PRICE_STARTER_ANNUAL
              name: keybuzz-stripe
              optional: true
        - name: STRIPE_PRICE_PRO_MONTHLY
          valueFrom:
            secretKeyRef:
              key: STRIPE_PRICE_PRO_MONTHLY
              name: keybuzz-stripe
              optional: true
        - name: STRIPE_PRICE_PRO_ANNUAL
          valueFrom:
            secretKeyRef:
              key: STRIPE_PRICE_PRO_ANNUAL
              name: keybuzz-stripe
              optional: true
        - name: STRIPE_PRICE_AUTOPILOT_MONTHLY
          valueFrom:
            secretKeyRef:
              key: STRIPE_PRICE_AUTOPILOT_MONTHLY
              name: keybuzz-stripe
              optional: true
        - name: STRIPE_PRICE_AUTOPILOT_ANNUAL
          valueFrom:
            secretKeyRef:
              key: STRIPE_PRICE_AUTOPILOT_ANNUAL
              name: keybuzz-stripe
              optional: true
        - name: STRIPE_PRICE_ADDON_CHANNEL_MONTHLY
          valueFrom:
            secretKeyRef:
              key: STRIPE_PRICE_ADDON_CHANNEL_MONTHLY
              name: keybuzz-stripe
              optional: true
        - name: STRIPE_PRICE_ADDON_CHANNEL_ANNUAL
          valueFrom:
            secretKeyRef:
              key: STRIPE_PRICE_ADDON_CHANNEL_ANNUAL
              name: keybuzz-stripe
              optional: true
        - name: APP_BASE_URL
          value: 'https://client-dev.keybuzz.io'
        - name: API_BASE_URL
          value: 'https://api-dev.keybuzz.io'
        - name: SMTP_HOST
          value: '49.13.35.167'
        - name: SMTP_PORT
          value: '25'
        - name: SMTP_SECURE
          value: 'false'
        - name: SMTP_TLS_REJECT_UNAUTHORIZED
          value: 'false'
        - name: SMTP_FROM
          value: '"KeyBuzz" <noreply@keybuzz.io>'
        - name: MINIO_ENDPOINT
          value: "http://10.0.0.11:9000"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_SECRET_KEY
        - name: MINIO_BUCKET_ATTACHMENTS
          value: "keybuzz-attachments"
        - name: LITELLM_BASE_URL
          value: "https://llm.keybuzz.io"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: keybuzz-api-jwt
              key: JWT_SECRET
              optional: true
        - name: COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: keybuzz-api-jwt
              key: COOKIE_SECRET
              optional: true
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: keybuzz-litellm
              key: LITELLM_MASTER_KEY
              optional: true
        - name: BACKEND_INTERNAL_URL
          value: "http://keybuzz-api.keybuzz-api-dev.svc.cluster.local:3001"
        - name: STRIPE_PRODUCT_ADDON_CHANNEL
          value: "prod_TjrtcvXp3I6fJR"
        # PH138-A: Agent KeyBuzz addon
        - name: STRIPE_PRODUCT_ADDON_AGENT_KEYBUZZ
          value: "prod_UFWneeyEEoBCIK"
        - name: STRIPE_PRICE_ADDON_AGENT_KEYBUZZ_MONTHLY
          value: "price_1TH1jjFC0QQLHISRIOPMo7ac"
        - name: STRIPE_PRICE_ADDON_AGENT_KEYBUZZ_ANNUAL
          value: "price_1TH1jjFC0QQLHISRuArLsIP9"
        # PH115: Controlled Real Execution (DEV only)
        - name: PH113_SAFE_MODE
          value: "true"
        - name: AI_REAL_EXECUTION_ENABLED
          value: "true"
        - name: PH114_EXPANDED_MODE
          value: "true"
        - name: AI_REAL_EXECUTION_TENANTS
          value: "ecomlg-001"
        - name: TRACKING_17TRACK_API_KEY
          valueFrom:
            secretKeyRef:
              name: tracking-17track
              key: TRACKING_17TRACK_API_KEY
              optional: true
        # ROLLBACK DEV to PH116 stable baseline (2026-03-20)
        # PREVIOUS: v3.6.20-ph116-integration-fix-dev
        # PREVIOUS: v3.5.51-playbooks-suggestions-live-dev
        # PH132-C: Autopilot critical fixes (plan guard + engine logging + safe mode)
        # PH132-D: Autopilot trigger for Octopia import (2026-03-28)
        # PH132-E: Bootstrap fix — seed starters with correct 8 active / 7 disabled
        # PH133-B: Delivery tracking truth recovery (2026-03-29)
        # PH136-B: Multi-carrier tracking aggregator (2026-03-30)
                # PH136-D: 17TRACK v2.4 webhook + register + polling (2026-03-30)
                # PH137-A: Autopilot smart response — improved prompts + history (2026-03-31)
                # PH137-C: AI consistency engine — unified logic Autopilot/Assist (2026-03-31)
                # PH137-D: AI mode orchestration — plan gating + mode engine (2026-03-31)
                # PH138-A: Stripe addon billing — Agent KeyBuzz product + endpoints (2026-03-31)
                # PH138-C: Stripe checkout enforced — no free activation (2026-03-31)
                # PH138-K: Stripe Checkout obligatoire pour addon, findPlanItem fix (2026-04-01)
                # PREVIOUS: v3.5.157-real-stripe-upgrade-e2e-dev
                # PREVIOUS: v3.5.165-escalation-flow-dev  # PH140-A
                # PREVIOUS: v3.5.173-invite-login-ux-polish-dev  # PH140-I
                # PREVIOUS: v3.5.178-agent-limits-dev  # PH141-A
                # PREVIOUS: v3.5.179-agent-limits-alignment-dev  # PH141-B
                # PREVIOUS: v3.5.182-ai-context-fix-dev  # PH141-F
                # PREVIOUS: v3.5.183-ai-quality-loop-dev  # PH142-A
                # PREVIOUS: v3.5.184-ai-error-clustering-dev  # PH142-B
                # PREVIOUS: v3.5.185-ai-action-consistency-dev  # PH142-C
                # PREVIOUS: v3.5.189-draft-lifecycle-kbactions-dev  # PH142-G
                # PH-SHOPIFY-01.1: Réalignement DEV sur base PROD validée
                # ROLLBACK: v3.5.48-ph143-agents-fix-dev
                # PH-PLAYBOOKS-V2: triggers fix + auto-seed + days_late
                # ROLLBACK: v3.5.224-ph143-agents-ia-prod
        - name: LEGACY_BACKEND_URL
          value: "http://keybuzz-backend.keybuzz-backend-dev.svc.cluster.local:4000"
        - name: SHOPIFY_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: keybuzz-shopify
              key: SHOPIFY_CLIENT_ID
        - name: SHOPIFY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: keybuzz-shopify
              key: SHOPIFY_CLIENT_SECRET
        - name: SHOPIFY_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: keybuzz-shopify
              key: SHOPIFY_ENCRYPTION_KEY
        - name: SHOPIFY_REDIRECT_URI
          value: "https://api-dev.keybuzz.io/shopify/callback"
        - name: SHOPIFY_CLIENT_REDIRECT_URL
          value: "https://client-dev.keybuzz.io/channels"
        image: ghcr.io/keybuzzio/keybuzz-api:v3.5.231-ph-shopify-022-fix-dev  # PH-SHOPIFY-02.2+03 | rollback: v3.5.228-ph-shopify-021-scopes-dev
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 15
        name: keybuzz-api
        ports:
        - containerPort: 3001
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: pg-secrets
          mountPath: /var/run/secrets/keybuzz-postgres
          readOnly: true
      imagePullSecrets:
      - name: ghcr-cred
      volumes:
      - name: pg-secrets
        secret:
          secretName: keybuzz-api-postgres