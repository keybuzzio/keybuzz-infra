# ⚠️ TEMPLATE ONLY — Ne JAMAIS commit le token réel dans Git !
#
# Créer le secret manuellement avec :
#   kubectl create secret generic vault-admin-token \
#     --namespace=vault-management \
#     --from-literal=token=<ROOT_TOKEN>
#
# Vérifier :
#   kubectl get secret vault-admin-token -n vault-management -o jsonpath='{.data.token}' | base64 -d
#
apiVersion: v1
kind: Secret
metadata:
  name: vault-admin-token
  namespace: vault-management
  labels:
    app.kubernetes.io/component: vault-token-renew
    app.kubernetes.io/managed-by: manual
type: Opaque
data:
  token: "REPLACEME_BASE64_ENCODED_ROOT_TOKEN"
