# =============================================================================
# DEPLOYMENT PROD - KeyBuzz Website
# =============================================================================
# ⚠️ NE PAS APPLIQUER AVANT LE CUTOVER
# Différences avec preview:
# - NEXT_PUBLIC_SITE_MODE = "production" (pas "preview")
# - Pas de basic auth
# - robots.txt autorise l'indexation
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-prod
  labels:
    app: keybuzz-website
    environment: prod
spec:
  replicas: 2  # HA en prod
  selector:
    matchLabels:
      app: keybuzz-website
  template:
    metadata:
      labels:
        app: keybuzz-website
        environment: prod
    spec:
      containers:
      - name: keybuzz-website
        # PH-WEBSITE-T8.11AK: forward marketing_owner_tenant_id, li_fat_id, _gl (KEY-223)
        # PH-T8.12P: TikTok browser pixel activated (D7PT12JC77U44OJIPC10)
        # WARNING: rebuild MUST include --build-arg NEXT_PUBLIC_TIKTOK_PIXEL_ID=D7PT12JC77U44OJIPC10
        # PH-SAAS-T8.12AN.6: promo forwarding from /pricing to /register
        image: ghcr.io/keybuzzio/keybuzz-website:v0.6.19-cta-tracking-prod  # PH-SAAS-T8.12AS.20.3-WEBSITE-CTA-TRACKING-TRAIN-PROD (2026-05-21): commit website 6af74a2 ; KEY-340 +11 nouveaux callsites trackMarketingClick : about_hero_secondary_features + about_final_primary_features + about_final_secondary_pricing (3 about) + homepage_reassurance_amazon_link + features_marketplaces_amazon_link + footer_product_* (3 dynamiques) + footer_amazon_* (3 dynamiques) ; bundle trackMarketingClick 26 -> 40 (+14 incl import statements) ; MarketingCTA wrapper preserve 36/36 (home 8/8 + features 8/8) ; pricing 7/7 + Navbar 5/5 preserve (pricing_toggle_monthly 7, pricing_final_primary_autopilot 5, pricing_enterprise_contact 5) ; KEY-263 isolation PROD preservee (api.keybuzz.io seul 2, api-dev.keybuzz.io 0) ; Marketing IDs preserves iso baseline v0.6.18 (GA4 G-R3QQDYEBFG 18, SGTM t.keybuzz.pro 54, Meta 1234164602194748 2, TikTok D7PT12JC77U44OJIPC10 2, LinkedIn 9969977 18, Clarity wrff07upjx 2 actif Website seulement, KEY-322) ; helper marketing-tracking.ts consent-aware + presence flags only (KEY-326 + KEY-328 GA4 cleanup preserves) ; KEY-330 no fake events (delta 0 vs v0.6.18 sur Lead/Purchase/StartTrial/CompletePayment/SubmitForm/InitiateCheckout/AW-) ; KEY-338 reserve R2 PH-20.1 ADRESSEE en PROD ; rollback: v0.6.18-ga4-cleanup-prod (digest sha256:4a6785958f02bcfeadd6f5668e027d80d9fa9b475c4a78600b229688e9539af0) ; digest: sha256:1e8d73bb7e713473dca3beafa6d1386e412de5f2f934da4ec43075fbdf0b3dfb
        ports:
        - containerPort: 3000
        env:
        # ⚠️ DIFFÉRENCE CRITIQUE: "production" au lieu de "preview"
        - name: NEXT_PUBLIC_SITE_MODE
          value: "production"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
      imagePullSecrets:
      - name: ghcr-secret

---
apiVersion: v1
kind: Service
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-prod
  labels:
    app: keybuzz-website
    environment: prod
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: keybuzz-website

---
apiVersion: v1
kind: Namespace
metadata:
  name: keybuzz-website-prod
  labels:
    app: keybuzz-website
    environment: prod
