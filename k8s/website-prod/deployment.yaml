# =============================================================================
# DEPLOYMENT PROD - KeyBuzz Website
# =============================================================================
# ⚠️ NE PAS APPLIQUER AVANT LE CUTOVER
# Différences avec preview:
# - NEXT_PUBLIC_SITE_MODE = "production" (pas "preview")
# - Pas de basic auth
# - robots.txt autorise l'indexation
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-prod
  labels:
    app: keybuzz-website
    environment: prod
spec:
  replicas: 2  # HA en prod
  selector:
    matchLabels:
      app: keybuzz-website
  template:
    metadata:
      labels:
        app: keybuzz-website
        environment: prod
    spec:
      containers:
      - name: keybuzz-website
        # PH-WEBSITE-T8.11AK: forward marketing_owner_tenant_id, li_fat_id, _gl (KEY-223)
        # PH-T8.12P: TikTok browser pixel activated (D7PT12JC77U44OJIPC10)
        # WARNING: rebuild MUST include --build-arg NEXT_PUBLIC_TIKTOK_PIXEL_ID=D7PT12JC77U44OJIPC10
        # PH-SAAS-T8.12AN.6: promo forwarding from /pricing to /register
        image: ghcr.io/keybuzzio/keybuzz-website:v0.6.20-cmp-mobile-polish-prod  # PH-SAAS-T8.12AS.20.8-WEBSITE-CMP-MOBILE-POLISH-APPLY-PROD (2026-05-22): commit website bb49798 ; KEY-344 : promotion PROD CMP mobile compact apres validation Ludovic DEV ; PH-20.8 patch : mobile p-2 outer, max-h-[60vh] card + scroll, p-4 card, copy courte sm:hidden, buttons px-5 py-2 ; Desktop INCHANGE via classes responsive sm:* ; Compliance preserve : Accepter/Refuser equilibres, liens politique cookies + confidentialite visibles, close X handleRefuse, CONSENT_VERSION 2 / TTL 12 mois preserves, pas de dark pattern ; Tracking 100% preserve : GA G-R3QQDYEBFG=18, SGTM t.keybuzz.pro=39, LinkedIn 9969977=18, marketing_cta_click=1, trackMarketingClick=15 ; KEY-263 isolation PROD : api-prod=2, api-dev=0 ; Mode PROD : isPreview=0 baked, NEXT_PUBLIC_SITE_MODE=production, NEXT_PUBLIC_CONTACT_API_URL=https://api.keybuzz.io/api/public/contact ; 0 fake event delta vs baseline v0.6.19 PROD (Lead=3 faux positifs Tailwind leading-*) ; rollback: v0.6.19-cta-tracking-prod ; manifest digest GHCR: sha256:f936b7b4e72a37b81d697f13fba1f040396ff1d9789fbb7df0ea874d84e5df23
        ports:
        - containerPort: 3000
        env:
        # ⚠️ DIFFÉRENCE CRITIQUE: "production" au lieu de "preview"
        - name: NEXT_PUBLIC_SITE_MODE
          value: "production"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
      imagePullSecrets:
      - name: ghcr-secret

---
apiVersion: v1
kind: Service
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-prod
  labels:
    app: keybuzz-website
    environment: prod
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: keybuzz-website

---
apiVersion: v1
kind: Namespace
metadata:
  name: keybuzz-website-prod
  labels:
    app: keybuzz-website
    environment: prod
