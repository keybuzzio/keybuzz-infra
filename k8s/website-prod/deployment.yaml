# =============================================================================
# DEPLOYMENT PROD - KeyBuzz Website
# =============================================================================
# ⚠️ NE PAS APPLIQUER AVANT LE CUTOVER
# Différences avec preview:
# - NEXT_PUBLIC_SITE_MODE = "production" (pas "preview")
# - Pas de basic auth
# - robots.txt autorise l'indexation
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-prod
  labels:
    app: keybuzz-website
    environment: prod
spec:
  replicas: 2  # HA en prod
  selector:
    matchLabels:
      app: keybuzz-website
  template:
    metadata:
      labels:
        app: keybuzz-website
        environment: prod
    spec:
      containers:
      - name: keybuzz-website
        # PH-WEBSITE-T8.11AK: forward marketing_owner_tenant_id, li_fat_id, _gl (KEY-223)
        # PH-T8.12P: TikTok browser pixel activated (D7PT12JC77U44OJIPC10)
        # WARNING: rebuild MUST include --build-arg NEXT_PUBLIC_TIKTOK_PIXEL_ID=D7PT12JC77U44OJIPC10
        # PH-SAAS-T8.12AN.6: promo forwarding from /pricing to /register
        image: ghcr.io/keybuzzio/keybuzz-website:v0.6.18-ga4-cleanup-prod  # PH-WEBSITE-T8.12AS.18.3B-GA4-CLEANUP-PROD-CLARITY-REBUILD (2026-05-20): commit website 3baecc2 ; GA4 cleanup _gl_present -> cross_domain_gl_present (param GA4-safe via ATTRIBUTION_FLAG_NAMES, fin warnings Tag Assistant) + Clarity website wrff07upjx restore bake (NEXT_PUBLIC_CLARITY_PROJECT_ID), aucune activation Clarity client.keybuzz.io ; 10 ctaIds v0.6.17 + 18.1 + 18.2 preserves, marketing_cta_click engagement only ; no fake events fbq/ttq Lead/InitiateCheckout/SubmitForm, no AW direct, isolation PROD/DEV preserve (client.keybuzz.io + api.keybuzz.io present, *-dev absent) ; KEY-326 + KEY-328 ; rollback: v0.6.17-cta-density-prod (digest sha256:f95bdcd645bc7b66edd4442cbf9a66fc8ddd51d7d65e52078e9bdad890060b68) ; digest: sha256:4a6785958f02bcfeadd6f5668e027d80d9fa9b475c4a78600b229688e9539af0
        ports:
        - containerPort: 3000
        env:
        # ⚠️ DIFFÉRENCE CRITIQUE: "production" au lieu de "preview"
        - name: NEXT_PUBLIC_SITE_MODE
          value: "production"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
      imagePullSecrets:
      - name: ghcr-secret

---
apiVersion: v1
kind: Service
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-prod
  labels:
    app: keybuzz-website
    environment: prod
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: keybuzz-website

---
apiVersion: v1
kind: Namespace
metadata:
  name: keybuzz-website-prod
  labels:
    app: keybuzz-website
    environment: prod
