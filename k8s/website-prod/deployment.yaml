# =============================================================================
# DEPLOYMENT PROD - KeyBuzz Website
# =============================================================================
# ⚠️ NE PAS APPLIQUER AVANT LE CUTOVER
# Différences avec preview:
# - NEXT_PUBLIC_SITE_MODE = "production" (pas "preview")
# - Pas de basic auth
# - robots.txt autorise l'indexation
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-prod
  labels:
    app: keybuzz-website
    environment: prod
spec:
  replicas: 2  # HA en prod
  selector:
    matchLabels:
      app: keybuzz-website
  template:
    metadata:
      labels:
        app: keybuzz-website
        environment: prod
    spec:
      containers:
      - name: keybuzz-website
        # PH-WEBSITE-T8.11AK: forward marketing_owner_tenant_id, li_fat_id, _gl (KEY-223)
        # PH-T8.12P: TikTok browser pixel activated (D7PT12JC77U44OJIPC10)
        # WARNING: rebuild MUST include --build-arg NEXT_PUBLIC_TIKTOK_PIXEL_ID=D7PT12JC77U44OJIPC10
        # PH-SAAS-T8.12AN.6: promo forwarding from /pricing to /register
        image: ghcr.io/keybuzzio/keybuzz-website:v0.6.21-pricing-action-recover-prod  # PH-SAAS-T8.12AS.20.10B-WEBSITE-PRICING-SERVER-ACTION-APPLY-PROD (2026-05-22): commit website 907689b ; KEY-346 : fix defensif error boundary auto-reload single-shot sur Failed to find Server Action (guard sessionStorage kb_pricing_server_action_reload_v1) ; src/app/error.tsx + src/app/global-error.tsx +44 lignes ; tracking baseline preserve (GA G-R3QQDYEBFG, SGTM t.keybuzz.pro, LinkedIn 9969977, marketing_cta_click, trackMarketingClick) ; CMP PH-20.8 preserve ; KEY-263 isolation PROD OK (api.keybuzz.io contact present, api-dev absent, client.keybuzz.io) ; manifest digest GHCR : sha256:8fefca2e6384d35c2309c02c70c829e756f72b99001c71d8db68d5c78abe009b ; rollback v0.6.20-cmp-mobile-polish-prod
        ports:
        - containerPort: 3000
        env:
        # ⚠️ DIFFÉRENCE CRITIQUE: "production" au lieu de "preview"
        - name: NEXT_PUBLIC_SITE_MODE
          value: "production"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
      imagePullSecrets:
      - name: ghcr-secret

---
apiVersion: v1
kind: Service
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-prod
  labels:
    app: keybuzz-website
    environment: prod
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: keybuzz-website

---
apiVersion: v1
kind: Namespace
metadata:
  name: keybuzz-website-prod
  labels:
    app: keybuzz-website
    environment: prod
