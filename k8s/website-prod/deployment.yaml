# =============================================================================
# DEPLOYMENT PROD - KeyBuzz Website
# =============================================================================
# ⚠️ NE PAS APPLIQUER AVANT LE CUTOVER
# Différences avec preview:
# - NEXT_PUBLIC_SITE_MODE = "production" (pas "preview")
# - Pas de basic auth
# - robots.txt autorise l'indexation
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-prod
  labels:
    app: keybuzz-website
    environment: prod
spec:
  replicas: 2  # HA en prod
  selector:
    matchLabels:
      app: keybuzz-website
  template:
    metadata:
      labels:
        app: keybuzz-website
        environment: prod
    spec:
      containers:
      - name: keybuzz-website
        # PH-WEBSITE-T8.11AK: forward marketing_owner_tenant_id, li_fat_id, _gl (KEY-223)
        # PH-T8.12P: TikTok browser pixel activated (D7PT12JC77U44OJIPC10)
        # WARNING: rebuild MUST include --build-arg NEXT_PUBLIC_TIKTOK_PIXEL_ID=D7PT12JC77U44OJIPC10
        # PH-SAAS-T8.12AN.6: promo forwarding from /pricing to /register
        image: ghcr.io/keybuzzio/keybuzz-website:v0.6.22-clarity-restore-prod  # PH-SAAS-T8.12AS.20.15D (2026-05-26) KEY-322/KEY-337 : restore Clarity wrff07upjx + Meta 1234164602194748 + TikTok D7PT12JC77U44OJIPC10 (v0.6.21 build PH-20.10B avait droppe ces 3 build-args NEXT_PUBLIC) ; commit website 907689b ; manifest digest GHCR sha256:974350d524ba80df77fcece54dc92156a9a3cc578d862e8cd1b2ffe21cee87ac ; config sha256:619afbd95b82 ; GA G-R3QQDYEBFG/SGTM t.keybuzz.pro/LinkedIn 9969977 preserves ; rollback v0.6.21-pricing-action-recover-prod
        ports:
        - containerPort: 3000
        env:
        # ⚠️ DIFFÉRENCE CRITIQUE: "production" au lieu de "preview"
        - name: NEXT_PUBLIC_SITE_MODE
          value: "production"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
      imagePullSecrets:
      - name: ghcr-secret

---
apiVersion: v1
kind: Service
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-prod
  labels:
    app: keybuzz-website
    environment: prod
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: keybuzz-website

---
apiVersion: v1
kind: Namespace
metadata:
  name: keybuzz-website-prod
  labels:
    app: keybuzz-website
    environment: prod
