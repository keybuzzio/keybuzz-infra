apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-dev
  labels:
    app: keybuzz-website
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-website
  template:
    metadata:
      labels:
        app: keybuzz-website
        environment: dev
    spec:
      containers:
      - name: keybuzz-website
        # PH-WEBSITE-T8.11AK: forward marketing_owner_tenant_id, li_fat_id, _gl (KEY-223)
        image: ghcr.io/keybuzzio/keybuzz-website:v0.6.16-cta-granular-tracking-dev  # PH-WEBSITE-T8.12AS.18.1-CTA-GRANULAR-TRACKING (2026-05-19): tracking CTA granulaire homepage + pricing (marketing_cta_click avec plan/cycle/cta_section/attribution_flags), retrait faux events Meta Lead/InitiateCheckout et TikTok SubmitForm/InitiateCheckout des clics CTA, forwarding UTM navbar signup (KEY-322 follow-up) ; rollback: v0.6.15-google-ads-oauth-page-dev (digest sha256:9183f409a4f5348973c8c9ebaaca382918646de89cce29a54c7382851a6dc177) ; digest: sha256:dd17a79156a363a301679826436bcb5278b54de7f03479c453c2b33d31a3253f
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_SITE_MODE
        - name: NEXT_PUBLIC_CLIENT_APP_URL
          value: "https://client-dev.keybuzz.io"
          value: "preview"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
      imagePullSecrets:
      - name: ghcr-secret