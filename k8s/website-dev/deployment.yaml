apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-dev
  labels:
    app: keybuzz-website
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-website
  template:
    metadata:
      labels:
        app: keybuzz-website
        environment: dev
    spec:
      containers:
      - name: keybuzz-website
        # PH-WEBSITE-T8.11AK: forward marketing_owner_tenant_id, li_fat_id, _gl (KEY-223)
        image: ghcr.io/keybuzzio/keybuzz-website:v0.6.20-cmp-mobile-polish-dev  # PH-SAAS-T8.12AS.20.8-WEBSITE-CMP-MOBILE-POLISH-APPLY-DEV (2026-05-22): commit website bb49798 ; KEY-344 : CMP mobile compact (max-h 60vh, p-2 outer, p-4 card, copy courte sm:hidden, buttons px-5 py-2) ; Desktop INCHANGE via classes responsive sm:* ; Compliance preserve : Accepter/Refuser equilibres, liens politique cookies + confidentialite visibles, close X handleRefuse, CONSENT_VERSION 2 / TTL 12 mois preserves, pas de dark pattern ; Tracking 100% preserve : GA G-R3QQDYEBFG=18, SGTM t.keybuzz.pro=39, LinkedIn 9969977=18, marketing_cta_click=1, trackMarketingClick=15 ; KEY-263 isolation DEV preservee : api-dev=2, api-prod seul=0 ; 0 fake event delta vs baseline v0.6.19 (Lead=3 faux positifs Tailwind leading-*) ; rollback: v0.6.19-cta-tracking-dev ; manifest digest GHCR: sha256:e7e09b2653a539079090307070876c40cd13b772d382a5ee6b2dbce5e3f833fe
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_SITE_MODE
        - name: NEXT_PUBLIC_CLIENT_APP_URL
          value: "https://client-dev.keybuzz.io"
          value: "preview"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
      imagePullSecrets:
      - name: ghcr-secret