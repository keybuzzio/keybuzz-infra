apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-dev
  labels:
    app: keybuzz-website
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-website
  template:
    metadata:
      labels:
        app: keybuzz-website
        environment: dev
    spec:
      containers:
      - name: keybuzz-website
        # PH-WEBSITE-T8.11AK: forward marketing_owner_tenant_id, li_fat_id, _gl (KEY-223)
        image: ghcr.io/keybuzzio/keybuzz-website:v0.6.18-ga4-cleanup-dev  # PH-WEBSITE-T8.12AS.18.3-GA4-PARAMS-CLEANUP (2026-05-20): commit website 3baecc2 ; rename flag GA4 `_gl_present` -> `cross_domain_gl_present` (GA4 refuse params commencant par "_") ; forwarding URL `_gl` preserve (ATTRIBUTION_KEYS / pricing utmKeys / Navbar) ; marketing_cta_click preserve ; no fake events Meta/TikTok browser-side ; KEY-326 ; rollback: v0.6.17-cta-density-dev (digest sha256:56accd8047371b73340cc860ed7804777105d599be7714ece7194d1681e28173) ; digest: sha256:63882ba57960726fe8689784e0d3325be327019acc466e8239635588fb47baec
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_SITE_MODE
        - name: NEXT_PUBLIC_CLIENT_APP_URL
          value: "https://client-dev.keybuzz.io"
          value: "preview"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
      imagePullSecrets:
      - name: ghcr-secret