apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-dev
  labels:
    app: keybuzz-website
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-website
  template:
    metadata:
      labels:
        app: keybuzz-website
        environment: dev
    spec:
      containers:
      - name: keybuzz-website
        # PH-WEBSITE-T8.11AK: forward marketing_owner_tenant_id, li_fat_id, _gl (KEY-223)
        # redesign passe 1 (light-business / KeyBuzz Prototype Claude Design) : branche redesign/light-business commit 020794b ;
        # build SITE_MODE=preview SANS build-args tracking (pas de pollution analytics PROD sur la preview) ;
        # digest GHCR sha256:71be73f2b25579ed2cf4fe1e9c0375caebd6894dbc20b06da897e0597a77ffff ;
        # rollback v0.6.21-pricing-action-recover-dev (sha256:8bdfb7a7479fed9de0b62106ca13077a75df19ad067ea11825adc7f8a51ab5ca) ;
        # FIX manifest : bloc env corrige (cle YAML value dupliquee + NEXT_PUBLIC_SITE_MODE sans valeur) ; sans effet runtime (NEXT_PUBLIC fige au build)
        image: ghcr.io/keybuzzio/keybuzz-website:v0.7.3-no-card-launch-pricing-dev
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_SITE_MODE
          value: "preview"
        - name: NEXT_PUBLIC_CLIENT_APP_URL
          value: "https://client-dev.keybuzz.io"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
      imagePullSecrets:
      - name: ghcr-secret
