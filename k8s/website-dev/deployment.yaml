apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-dev
  labels:
    app: keybuzz-website
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-website
  template:
    metadata:
      labels:
        app: keybuzz-website
        environment: dev
    spec:
      containers:
      - name: keybuzz-website
        # PH-WEBSITE-T8.11AK: forward marketing_owner_tenant_id, li_fat_id, _gl (KEY-223)
        image: ghcr.io/keybuzzio/keybuzz-website:v0.6.17-cta-density-dev  # PH-WEBSITE-T8.12AS.18.2-CTA-DENSITY-HOMEPAGE-FEATURES (2026-05-19): commit website 844c739 ; relais CTA homepage entre reassurance/securite (homepage_after_reassurance_*) + features instrumente MarketingCTA + 2 nouveaux relais features (after_change_*, after_marketplaces_*) ; KEY-324 ; rollback: v0.6.16-cta-granular-tracking-dev (digest sha256:dd17a79156a363a301679826436bcb5278b54de7f03479c453c2b33d31a3253f) ; digest: sha256:56accd8047371b73340cc860ed7804777105d599be7714ece7194d1681e28173
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_SITE_MODE
        - name: NEXT_PUBLIC_CLIENT_APP_URL
          value: "https://client-dev.keybuzz.io"
          value: "preview"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
      imagePullSecrets:
      - name: ghcr-secret