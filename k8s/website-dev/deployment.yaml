apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-dev
  labels:
    app: keybuzz-website
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-website
  template:
    metadata:
      labels:
        app: keybuzz-website
        environment: dev
    spec:
      containers:
      - name: keybuzz-website
        # PH-WEBSITE-T8.11AK: forward marketing_owner_tenant_id, li_fat_id, _gl (KEY-223)
        image: ghcr.io/keybuzzio/keybuzz-website:v0.6.19-cta-tracking-dev  # PH-SAAS-T8.12AS.20.3-WEBSITE-CTA-TRACKING-APPLY-DEV (2026-05-21): commit website 6af74a2 ; KEY-340 +11 nouveaux callsites trackMarketingClick : about_hero_secondary_features + about_final_primary_features + about_final_secondary_pricing (3 about) + homepage_reassurance_amazon_link + features_marketplaces_amazon_link + footer_product_* (3 templates dynamiques) + footer_amazon_* (3 templates dynamiques) ; trackMarketingClick bundle delta 26 -> 40 (+14 incl import statements) ; MarketingCTA wrapper preserve 36/36 (home 8/8 + features 8/8) ; pricing 7/7 + Navbar 5/5 preserve ; KEY-263 isolation DEV preservee (api-dev=2, api.keybuzz.io seul=0) ; Marketing IDs preserves iso baseline v0.6.18 (GA4 G-R3QQDYEBFG 18, SGTM t.keybuzz.pro 54, Meta 1234164602194748 2, TikTok D7PT12JC77U44OJIPC10 2, LinkedIn 9969977 2) ; helper marketing-tracking.ts consent-aware + presence flags only (gclid/fbclid/ttclid/li_fat_id/cross_domain_gl/marketing_owner_tenant_id presence) ; KEY-330 no fake events (delta 0 vs v0.6.18 sur Lead/Purchase/StartTrial/CompletePayment/SubmitForm/InitiateCheckout/AW-) ; KEY-326 + KEY-328 GA4 cleanup preserves ; KEY-338 reserve R2 PH-20.1 ADRESSEE (correction audit : MarketingCTA wrapper deja 16 occurrences home+features non grep-able directement) ; rollback: v0.6.18-ga4-cleanup-dev (digest sha256:63882ba57960726fe8689784e0d3325be327019acc466e8239635588fb47baec) ; digest: sha256:2ec4789efa2ae74e3c4b84fa047f8f513c5ab06ad2ea1a98629170a2df1e66ed
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_SITE_MODE
        - name: NEXT_PUBLIC_CLIENT_APP_URL
          value: "https://client-dev.keybuzz.io"
          value: "preview"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
      imagePullSecrets:
      - name: ghcr-secret