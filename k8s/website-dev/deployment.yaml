apiVersion: apps/v1
kind: Deployment
metadata:
  name: keybuzz-website
  namespace: keybuzz-website-dev
  labels:
    app: keybuzz-website
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keybuzz-website
  template:
    metadata:
      labels:
        app: keybuzz-website
        environment: dev
    spec:
      containers:
      - name: keybuzz-website
        # PH-WEBSITE-T8.11AK: forward marketing_owner_tenant_id, li_fat_id, _gl (KEY-223)
        image: ghcr.io/keybuzzio/keybuzz-website:v0.6.14-cta-tracking-pass-dev  # PH-WEBSITE-T8.12AS.17.0 + AS.17.0.1 KEY-322 (2026-05-15): marketing CTA tracking pass (homepage + Navbar) + contact form NEXT_PUBLIC_CONTACT_API_URL env-driven (DEV bake https://api-dev.keybuzz.io/api/public/contact, no PROD fallback hardcode) ; Clarity DEV no-op preserve ; rollback: v0.6.13-clarity-website-dev (digest sha256:57318f5dec7590faa45ec782d1981f51953d7b9f8be24794bb6482a1d2d0acd7) ; digest: sha256:cd70934e102377cd2d7eb0bfb6b9d1db6910280b027befa9c36b8e991e42e088
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_SITE_MODE
        - name: NEXT_PUBLIC_CLIENT_APP_URL
          value: "https://client-dev.keybuzz.io"
          value: "preview"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
      imagePullSecrets:
      - name: ghcr-secret