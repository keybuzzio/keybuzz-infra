# PH-S03.2D: ExternalSecret — VAULT_TOKEN pour seller-api (lecture secrets FTP via Vault)
# Aucune valeur en clair ; référence Vault uniquement. ClusterSecretStore vault-backend (KV).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seller-api-vault
  namespace: keybuzz-seller-dev
  labels:
    app: seller-api
    app.kubernetes.io/part-of: keybuzz-seller
    environment: dev
    purpose: vault-runtime
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: seller-api-vault
    creationPolicy: Owner
  data:
    - secretKey: VAULT_TOKEN
      remoteRef:
        key: secret/keybuzz/dev/seller-api
        property: token
