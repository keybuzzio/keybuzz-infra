# KeyBuzz DEV — Shopify App Configuration
# This file is used by `shopify app deploy` to configure the app in the Partner Dashboard.
# It declares access scopes and mandatory compliance webhooks.

name = "KeyBuzz DEV"
client_id = "77b26855f61e20eb9b76b18fc9febfad"
application_url = "https://api-dev.keybuzz.io"
embedded = false

[access_scopes]
scopes = "read_orders,read_customers,read_fulfillments,read_returns"

[auth]
redirect_urls = ["https://api-dev.keybuzz.io/shopify/callback"]

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "https://api-dev.keybuzz.io/webhooks/shopify"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "https://api-dev.keybuzz.io/webhooks/shopify"

  [[webhooks.subscriptions]]
  topics = ["orders/create", "orders/updated"]
  uri = "https://api-dev.keybuzz.io/webhooks/shopify"
